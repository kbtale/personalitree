# ============================================================
# PersonaliTree – Docker Compose
# Services: db (PostgreSQL), web (Django), worker (Django Q2)
# ============================================================

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personalitree}
      POSTGRES_USER: ${POSTGRES_USER:-personalitree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-personalitree}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-personalitree} -d ${POSTGRES_DB:-personalitree}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---- Django Web Application ----
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ---- Django Q2 Background Worker ----
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: python manage.py qcluster
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
